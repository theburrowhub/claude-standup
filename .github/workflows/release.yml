name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claude-standup-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: claude-standup-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-standup-linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/claude-standup ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x artifacts/*/claude-standup-*
          gh release create "$GITHUB_REF_NAME" \
            --title "claude-standup ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            artifacts/*/claude-standup-*
